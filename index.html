<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAND·FIELD — 3D Particle System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #030508;
    --accent1: #00f0ff;
    --accent2: #ff2d6b;
    --accent3: #b8ff57;
    --ui-text: rgba(255,255,255,0.55);
    --ui-border: rgba(255,255,255,0.08);
  }

  body {
    background: var(--bg);
    color: #fff;
    font-family: 'Space Mono', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    user-select: none;
  }

  #canvas3d {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  #video {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 200px;
    height: 150px;
    border-radius: 8px;
    border: 1px solid var(--ui-border);
    opacity: 0.6;
    transform: scaleX(-1);
    object-fit: cover;
    z-index: 10;
  }

  #overlay-canvas {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 200px;
    height: 150px;
    border-radius: 8px;
    z-index: 11;
    pointer-events: none;
    transform: scaleX(-1);
  }

  #hud {
    position: fixed;
    top: 0; left: 0;
    z-index: 20;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    pointer-events: none;
  }

  #title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 4vw, 52px);
    letter-spacing: 0.12em;
    background: linear-gradient(90deg, var(--accent1), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  #subtitle {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--ui-text);
    text-transform: uppercase;
  }

  #stats {
    position: fixed;
    top: 24px;
    right: 28px;
    z-index: 20;
    text-align: right;
    pointer-events: none;
  }

  .stat-row {
    font-size: 10px;
    color: var(--ui-text);
    letter-spacing: 0.15em;
    line-height: 1.8;
  }

  .stat-val {
    color: var(--accent1);
    font-weight: 700;
  }

  #controls {
    position: fixed;
    bottom: 24px;
    left: 28px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
  }

  .ctrl-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 10px;
    color: var(--ui-text);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .ctrl-key {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--ui-border);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 9px;
    color: rgba(255,255,255,0.7);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-cyan { background: var(--accent1); box-shadow: 0 0 6px var(--accent1); }
  .dot-pink { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
  .dot-lime { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); }

  #status-bar {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 30;
    text-align: center;
    transition: opacity 0.8s;
  }

  #status-bar.hidden { opacity: 0; pointer-events: none; }

  #status-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(18px, 3vw, 36px);
    letter-spacing: 0.25em;
    color: var(--ui-text);
  }

  #mode-badge {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 0.3em;
    padding: 5px 18px;
    border-radius: 20px;
    border: 1px solid var(--ui-border);
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    transition: color 0.4s, border-color 0.4s;
    pointer-events: none;
  }

  #start-btn {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 40;
    background: transparent;
    border: 1px solid var(--accent1);
    color: var(--accent1);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.3em;
    padding: 14px 40px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.3s, color 0.3s;
  }
  #start-btn:hover {
    background: var(--accent1);
    color: #000;
  }

  #scanline {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 50;
    opacity: 0.5;
  }
</style>
</head>
<body>

<canvas id="canvas3d"></canvas>
<video id="video" autoplay playsinline muted></video>
<canvas id="overlay-canvas"></canvas>

<div id="scanline"></div>

<div id="hud">
  <div id="title">HAND·FIELD</div>
  <div id="subtitle">3D Particle Manipulation System</div>
</div>

<div id="stats">
  <div class="stat-row">PARTICLES <span class="stat-val" id="stat-count">0</span></div>
  <div class="stat-row">HANDS <span class="stat-val" id="stat-hands">0</span></div>
  <div class="stat-row">FPS <span class="stat-val" id="stat-fps">0</span></div>
  <div class="stat-row">FORCE <span class="stat-val" id="stat-force">0.00</span></div>
</div>

<div id="controls">
  <div class="ctrl-item"><span class="dot dot-cyan"></span> Open palm — attract particles</div>
  <div class="ctrl-item"><span class="dot dot-pink"></span> Fist — repel explosion</div>
  <div class="ctrl-item"><span class="dot dot-lime"></span> Pinch — vortex spin</div>
  <div class="ctrl-item">
    <span class="ctrl-key">M</span> cycle mode
    <span class="ctrl-key">R</span> reset
    <span class="ctrl-key">+/-</span> count
  </div>
</div>

<div id="mode-badge">MODE: ATTRACT</div>

<div id="status-bar">
  <div id="status-label">INITIALIZING CAMERA…</div>
</div>

<button id="start-btn">▶ ENABLE CAMERA</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── MediaPipe via CDN ───────────────────────────────────────────────────────
const MP_HANDS_URL = 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js';
const MP_CAMERA_URL = 'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js';
const MP_DRAW_URL   = 'https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js';

// ─── Constants ───────────────────────────────────────────────────────────────
const PARTICLE_COUNT_DEFAULT = 4000;
const PARTICLE_COUNT_MAX     = 10000;
const PARTICLE_COUNT_MIN     = 500;
let   PARTICLE_COUNT         = PARTICLE_COUNT_DEFAULT;

// ─── State ───────────────────────────────────────────────────────────────────
let hands        = null;
let cameraUtils  = null;
let handData     = [];   // [{x,y,z, gesture, landmarks}]
let mode         = 0;    // 0=attract 1=repel 2=vortex 3=gravity
const MODES      = ['ATTRACT','REPEL','VORTEX','GRAVITY WELL'];
const MODECOLORS = ['#00f0ff','#ff2d6b','#b8ff57','#ff9f43'];

let frameCount   = 0;
let lastFpsTime  = performance.now();
let fps          = 0;
let started      = false;

// ─── Three.js Setup ──────────────────────────────────────────────────────────
const canvas3d = document.getElementById('canvas3d');
const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, antialias: false, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x030508, 1);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 60);

// Fog
scene.fog = new THREE.FogExp2(0x030508, 0.008);

// ─── Particle System ─────────────────────────────────────────────────────────
let positions, velocities, colors, sizes, originalPos;
let geometry, material, points;

function buildParticles(count) {
  if (points) {
    scene.remove(points);
    geometry.dispose();
    material.dispose();
  }

  PARTICLE_COUNT = Math.max(PARTICLE_COUNT_MIN, Math.min(PARTICLE_COUNT_MAX, count));

  positions    = new Float32Array(PARTICLE_COUNT * 3);
  velocities   = new Float32Array(PARTICLE_COUNT * 3);
  colors       = new Float32Array(PARTICLE_COUNT * 3);
  sizes        = new Float32Array(PARTICLE_COUNT);
  originalPos  = new Float32Array(PARTICLE_COUNT * 3);

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const i3 = i * 3;
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = 20 + Math.random() * 30;
    positions[i3]   = r * Math.sin(phi) * Math.cos(theta);
    positions[i3+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i3+2] = r * Math.cos(phi);
    originalPos[i3]   = positions[i3];
    originalPos[i3+1] = positions[i3+1];
    originalPos[i3+2] = positions[i3+2];
    velocities[i3] = velocities[i3+1] = velocities[i3+2] = 0;

    // Color bands
    const t = i / PARTICLE_COUNT;
    if (t < 0.33) {
      colors[i3] = 0; colors[i3+1] = 0.9 + Math.random()*0.1; colors[i3+2] = 1;
    } else if (t < 0.66) {
      colors[i3] = 1; colors[i3+1] = 0.15 + Math.random()*0.1; colors[i3+2] = 0.42;
    } else {
      colors[i3] = 0.72; colors[i3+1] = 1; colors[i3+2] = 0.34;
    }

    sizes[i] = 0.5 + Math.random() * 1.5;
  }

  geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
  geometry.setAttribute('size',     new THREE.BufferAttribute(sizes, 1));

  material = new THREE.ShaderMaterial({
    vertexColors: true,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    vertexShader: `
      attribute float size;
      varying vec3 vColor;
      varying float vDist;
      void main() {
        vColor = color;
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        vDist = -mvPos.z;
        gl_PointSize = size * (300.0 / vDist);
        gl_Position = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      varying float vDist;
      void main() {
        vec2 uv = gl_PointCoord - 0.5;
        float d = length(uv);
        if (d > 0.5) discard;
        float alpha = smoothstep(0.5, 0.1, d);
        float glow  = smoothstep(0.5, 0.0, d) * 0.6;
        gl_FragColor = vec4(vColor + glow, alpha * 0.85);
      }
    `
  });

  points = new THREE.Points(geometry, material);
  scene.add(points);

  document.getElementById('stat-count').textContent = PARTICLE_COUNT.toLocaleString();
}

buildParticles(PARTICLE_COUNT_DEFAULT);

// ─── Overlay (hand skeleton on video preview) ────────────────────────────────
const overlayCanvas = document.getElementById('overlay-canvas');
const octx = overlayCanvas.getContext('2d');
overlayCanvas.width  = 200;
overlayCanvas.height = 150;

// ─── Hand gesture detection ──────────────────────────────────────────────────
function detectGesture(lm) {
  // Finger tip indices: thumb=4, index=8, middle=12, ring=16, pinky=20
  // Finger base indices: thumb=2, index=5, middle=9, ring=13, pinky=17
  const tips  = [4, 8, 12, 16, 20];
  const bases = [2, 5,  9, 13, 17];

  // Pinch: thumb tip close to index tip
  const dx = lm[4].x - lm[8].x;
  const dy = lm[4].y - lm[8].y;
  const pinchDist = Math.sqrt(dx*dx + dy*dy);
  if (pinchDist < 0.06) return 'pinch';

  // Count extended fingers
  let extended = 0;
  for (let i = 1; i < 5; i++) {
    if (lm[tips[i]].y < lm[bases[i]].y) extended++;
  }

  if (extended === 0) return 'fist';
  if (extended >= 4) return 'open';
  return 'point';
}

// ─── Map hand landmark to 3D space ──────────────────────────────────────────
function lmTo3D(lm, idx) {
  // lm coords are 0-1, map to scene space [-40,40]
  const x = -(lm[idx].x - 0.5) * 80;   // mirror
  const y = -(lm[idx].y - 0.5) * 60;
  const z = -lm[idx].z * 40;
  return { x, y, z };
}

// ─── Physics ─────────────────────────────────────────────────────────────────
const DAMPING   = 0.92;
const RESTORE   = 0.002;
const MAX_SPEED = 3.5;

function updateParticles(dt) {
  const t = performance.now() * 0.001;

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const i3 = i * 3;
    let px = positions[i3], py = positions[i3+1], pz = positions[i3+2];
    let vx = velocities[i3], vy = velocities[i3+1], vz = velocities[i3+2];

    // Restoration force toward original shell
    const ox = originalPos[i3], oy = originalPos[i3+1], oz = originalPos[i3+2];
    vx += (ox - px) * RESTORE;
    vy += (oy - py) * RESTORE;
    vz += (oz - pz) * RESTORE;

    // Subtle swirl
    const swirl = 0.0015;
    vx += -py * swirl;
    vy +=  px * swirl;

    // Apply hand forces
    let totalForce = 0;
    for (const hd of handData) {
      const hx = hd.x, hy = hd.y, hz = hd.z;
      const ddx = hx - px, ddy = hy - py, ddz = hz - pz;
      const dist2 = ddx*ddx + ddy*ddy + ddz*ddz + 0.01;
      const dist  = Math.sqrt(dist2);

      let strength = 0;
      const currentMode = mode;

      // Gesture overrides
      const gesture = hd.gesture;
      if (gesture === 'fist') {
        // Explode outward
        const f = 80 / dist2;
        vx -= ddx / dist * f;
        vy -= ddy / dist * f;
        vz -= ddz / dist * f;
        totalForce += f;
      } else if (gesture === 'pinch') {
        // Vortex
        const cross_x = ddy * (hz) - ddz * (hy);
        const cross_y = ddz * (hx) - ddx * (hz);
        const cross_z = ddx * (hy) - ddy * (hx);
        const f = 40 / (dist2 + 1);
        vx += cross_x / (dist + 1) * f;
        vy += cross_y / (dist + 1) * f;
        vz += cross_z / (dist + 1) * f;
        // Also pull in slightly
        const pull = 15 / dist2;
        vx += ddx / dist * pull;
        vy += ddy / dist * pull;
        vz += ddz / dist * pull;
        totalForce += f;
      } else {
        // Open / point — use mode
        if (currentMode === 0) {
          // Attract
          strength = 120 / (dist2 + 2);
          vx += ddx / dist * strength;
          vy += ddy / dist * strength;
          vz += ddz / dist * strength;
        } else if (currentMode === 1) {
          // Repel
          strength = 80 / (dist2 + 1);
          vx -= ddx / dist * strength;
          vy -= ddy / dist * strength;
          vz -= ddz / dist * strength;
        } else if (currentMode === 2) {
          // Vortex
          const axis = { x: 0, y: 0, z: 1 };
          const tang_x = ddy * axis.z - ddz * axis.y;
          const tang_y = ddz * axis.x - ddx * axis.z;
          const tang_z = ddx * axis.y - ddy * axis.x;
          const f = 60 / (dist2 + 1);
          vx += tang_x / (dist+0.1) * f;
          vy += tang_y / (dist+0.1) * f;
          vz += tang_z / (dist+0.1) * f;
          const pull = 30 / (dist2 + 1);
          vx += ddx / dist * pull;
          vy += ddy / dist * pull;
          vz += ddz / dist * pull;
        } else if (currentMode === 3) {
          // Gravity well — pull strongly
          strength = 200 / (dist2 + 0.5);
          vx += ddx / dist * strength;
          vy += ddy / dist * strength;
          vz += ddz / dist * strength;
        }
        totalForce += strength;
      }

      // Update color brightness by proximity
      const proximity = Math.min(1, 30 / (dist + 0.1));
      const base = i / PARTICLE_COUNT;
      if (base < 0.33) {
        colors[i3] = proximity * 0.3; colors[i3+1] = 0.7 + proximity * 0.3; colors[i3+2] = 1;
      } else if (base < 0.66) {
        colors[i3] = 1; colors[i3+1] = 0.15 + proximity * 0.2; colors[i3+2] = 0.42 + proximity * 0.3;
      } else {
        colors[i3] = 0.6 + proximity * 0.3; colors[i3+1] = 1; colors[i3+2] = 0.2 + proximity * 0.2;
      }

      document.getElementById('stat-force').textContent = totalForce.toFixed(2);
    }

    // Damping & clamp
    vx *= DAMPING; vy *= DAMPING; vz *= DAMPING;
    const spd = Math.sqrt(vx*vx + vy*vy + vz*vz);
    if (spd > MAX_SPEED) { const s = MAX_SPEED / spd; vx *= s; vy *= s; vz *= s; }

    positions[i3]   = px + vx;
    positions[i3+1] = py + vy;
    positions[i3+2] = pz + vz;
    velocities[i3]   = vx;
    velocities[i3+1] = vy;
    velocities[i3+2] = vz;
    sizes[i] = 0.5 + Math.random() * 1.5 * (1 + handData.length * 0.3);
  }

  geometry.attributes.position.needsUpdate = true;
  geometry.attributes.color.needsUpdate    = true;
  geometry.attributes.size.needsUpdate     = true;
}

// ─── Render Loop ─────────────────────────────────────────────────────────────
let lastTime = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt  = (now - lastTime) / 16.67;
  lastTime  = now;

  // Slow camera rotation
  points.rotation.y += 0.0008;

  updateParticles(dt);
  renderer.render(scene, camera);

  // FPS
  frameCount++;
  if (now - lastFpsTime >= 500) {
    fps = Math.round(frameCount / ((now - lastFpsTime) / 1000));
    frameCount = 0;
    lastFpsTime = now;
    document.getElementById('stat-fps').textContent = fps;
    document.getElementById('stat-hands').textContent = handData.length;
  }
}
animate();

// ─── MediaPipe Hands ─────────────────────────────────────────────────────────
function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

async function initMediaPipe() {
  await loadScript(MP_HANDS_URL);
  await loadScript(MP_CAMERA_URL);
  await loadScript(MP_DRAW_URL);

  const videoEl = document.getElementById('video');

  hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}` });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.6
  });

  hands.onResults(results => {
    octx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
      handData = [];
      return;
    }

    handData = results.multiHandLandmarks.map(lm => {
      const wrist = lmTo3D(lm, 0);
      const gesture = detectGesture(lm);

      // Draw skeleton
      drawConnectors(octx, lm, HAND_CONNECTIONS, {
        color: gesture === 'fist' ? '#ff2d6b' : gesture === 'pinch' ? '#b8ff57' : '#00f0ff',
        lineWidth: 1.5
      });
      drawLandmarks(octx, lm, {
        color: '#ffffff',
        lineWidth: 1,
        radius: 2
      });

      return { ...wrist, gesture, landmarks: lm };
    });
  });

  const cam = new Camera(videoEl, {
    onFrame: async () => { await hands.send({ image: videoEl }); },
    width: 320, height: 240,
    facingMode: 'user'
  });
  cam.start();

  document.getElementById('status-bar').classList.add('hidden');
  started = true;
}

// ─── Start Button ────────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', async () => {
  document.getElementById('start-btn').style.display = 'none';
  document.getElementById('status-label').textContent = 'REQUESTING CAMERA…';
  try {
    await initMediaPipe();
  } catch(e) {
    document.getElementById('status-label').textContent = 'CAMERA ERROR — ' + e.message;
    document.getElementById('status-bar').classList.remove('hidden');
  }
});

// ─── Keyboard Controls ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();
  if (key === 'm') {
    mode = (mode + 1) % MODES.length;
    const badge = document.getElementById('mode-badge');
    badge.textContent = 'MODE: ' + MODES[mode];
    badge.style.color = MODECOLORS[mode];
    badge.style.borderColor = MODECOLORS[mode] + '44';
  }
  if (key === 'r') {
    for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
      positions[i] = originalPos[i];
      velocities[i] = 0;
    }
    geometry.attributes.position.needsUpdate = true;
  }
  if (key === '+' || key === '=') buildParticles(PARTICLE_COUNT + 1000);
  if (key === '-') buildParticles(PARTICLE_COUNT - 1000);
});

// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
